{% extends "base.html" %}

{% block title %}{{ title }}{% end %}

{% block content %}
<script>document.body.classList.add('dark-theme');</script>
<style>
    body {
        background: linear-gradient(135deg, #0a0c15 0%, #141830 30%, #1a1040 60%, #0d1020 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
        position: relative;
    }
    body::before {
        content: '';
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background:
            radial-gradient(circle at 30% 20%, rgba(95,184,120,0.06) 0%, transparent 50%),
            radial-gradient(circle at 70% 80%, rgba(94,163,255,0.06) 0%, transparent 50%);
        pointer-events: none;
    }
    .register-wrapper {
        position: relative; z-index: 1;
        max-width: 420px; width: 90%; padding: 40px;
        background: rgba(22,24,40,0.92);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        backdrop-filter: blur(20px);
    }
    .register-wrapper .logo { text-align: center; margin-bottom: 8px; font-size: 36px; }
    .register-wrapper h2 {
        text-align: center; font-size: 22px; font-weight: 700;
        color: var(--text-primary); margin: 0 0 6px;
    }
    .register-wrapper .subtitle {
        text-align: center; font-size: 13px; color: var(--text-muted); margin-bottom: 24px;
    }
    .register-wrapper .input-group { margin-bottom: 16px; }
    .register-wrapper .input-group label {
        display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 6px;
    }
    .register-wrapper .input-group input {
        width: 100%; padding: 10px 14px;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 8px; color: var(--text-primary); font-size: 14px;
        outline: none; transition: all 0.2s;
        box-sizing: border-box;
    }
    .register-wrapper .input-group input:focus {
        border-color: rgba(95,184,120,0.4);
        box-shadow: 0 0 0 3px rgba(95,184,120,0.08);
    }
    .register-wrapper .input-group input.input-error {
        border-color: var(--accent-red);
        box-shadow: 0 0 0 3px rgba(255,87,34,0.08);
    }
    .register-wrapper .btn-submit {
        width: 100%; padding: 12px;
        background: linear-gradient(135deg, #5FB878, #45a063);
        color: #fff; border: none; border-radius: 24px;
        font-size: 15px; font-weight: 600; cursor: pointer;
        transition: all 0.3s;
    }
    .register-wrapper .btn-submit:hover {
        transform: scale(1.02);
        box-shadow: 0 4px 20px rgba(95,184,120,0.3);
    }
    .register-wrapper .btn-submit:disabled {
        opacity: 0.6; cursor: not-allowed; transform: none;
    }
    .register-wrapper .form-footer {
        text-align: center; margin-top: 20px;
        font-size: 13px; color: var(--text-muted);
    }
    .register-wrapper .form-footer a { color: var(--accent-blue); text-decoration: none; }
    .register-wrapper .form-footer a:hover { text-decoration: underline; }
    .error-msg {
        background: rgba(255,87,34,0.1);
        border: 1px solid rgba(255,87,34,0.3);
        color: var(--accent-red); padding: 10px 14px;
        border-radius: 8px; margin-bottom: 16px;
        font-size: 13px; text-align: center;
    }
</style>

<div class="register-wrapper">
    <div class="logo">🔭</div>
    <h2>创建账户</h2>
    <p class="subtitle">注册瞭望与问数系统账号</p>

    {% if error %}
    <div class="error-msg">⚠ {{ error }}</div>
    {% end %}

    <form method="post" action="/register" id="register-form" onsubmit="return handleRegisterSubmit()">
        {% module xsrf_form_html() %}
        <div class="input-group">
            <label>用户名</label>
            <input type="text" name="username" id="reg-username" placeholder="请输入用户名（至少2个字符）"
                   autocomplete="off" required minlength="2">
        </div>
        <div class="input-group">
            <label>密码</label>
            <input type="password" name="password" id="reg-password" placeholder="至少8位，包含至少两类字符"
                   autocomplete="off" required minlength="8">
        </div>
        <div class="input-group">
            <label>确认密码</label>
            <input type="password" name="password_confirm" id="reg-password-confirm" placeholder="请再次输入密码"
                   autocomplete="off" required minlength="8">
        </div>
        <button type="submit" class="btn-submit" id="reg-submit">注 册</button>
    </form>

    <div class="form-footer">
        已有账号？<a href="/">立即登录</a>
    </div>
</div>

<script>
function handleRegisterSubmit() {
    var pwd = document.getElementById('reg-password');
    var pwdConfirm = document.getElementById('reg-password-confirm');
    var submitBtn = document.getElementById('reg-submit');

    // 密码一致性校验
    if (pwd.value !== pwdConfirm.value) {
        pwdConfirm.classList.add('input-error');
        pwdConfirm.focus();
        // 使用原生方式显示错误（layui 可能未加载）
        var errDiv = document.querySelector('.error-msg');
        if (!errDiv) {
            errDiv = document.createElement('div');
            errDiv.className = 'error-msg';
            document.getElementById('register-form').insertBefore(errDiv, document.getElementById('register-form').firstChild);
        }
        errDiv.textContent = '⚠ 两次输入的密码不一致';
        return false;
    }

    // 禁用按钮防重复提交
    submitBtn.disabled = true;
    submitBtn.textContent = '注册中...';
    return true;
}
</script>
{% end %}
