{% extends "base_layout.html" %}

{% block title %}{{ title }}{% end %}

{% block admin_content %}
<div class="layui-card">
    <div class="layui-card-header">
        <i class="layui-icon layui-icon-password"></i> 修改密码
    </div>
    <div class="layui-card-body" style="max-width: 500px;">
        <form class="layui-form" action="/admin/user/change-password" method="post">
            {% module xsrf_form_html() %}
            <div class="layui-form-item">
                <label class="layui-form-label">旧密码</label>
                <div class="layui-input-block">
                    <input type="password" name="old_password" required lay-verify="required"
                           placeholder="请输入当前密码" autocomplete="current-password"
                           class="layui-input">
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">新密码</label>
                <div class="layui-input-block">
                    <input type="password" name="new_password" required lay-verify="required|pass"
                           placeholder="至少8位，包含至少两类字符" autocomplete="new-password"
                           minlength="8"
                           class="layui-input">
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">确认密码</label>
                <div class="layui-input-block">
                    <input type="password" name="confirm_password" required lay-verify="required|pass"
                           placeholder="再次输入新密码" autocomplete="new-password"
                           minlength="8"
                           class="layui-input">
                </div>
            </div>
            <div class="layui-form-item">
                <div class="layui-input-block">
                    <button type="submit" class="layui-btn layui-btn-normal">
                        <i class="layui-icon layui-icon-ok"></i> 确认修改
                    </button>
                    <a href="/admin" class="layui-btn layui-btn-primary">返回控制台</a>
                </div>
            </div>
        </form>
    </div>
</div>
{% end %}

{% block admin_scripts %}
<script>
layui.use('form', function(){
    var form = layui.form;
    form.verify({
        pass: function(value, item){
            if(value.length < 8){
                return '密码长度至少需要8个字符';
            }
            var categories = [/[A-Z]/, /[a-z]/, /[0-9]/, /[^A-Za-z0-9]/]
                .filter(function(pattern){ return pattern.test(value); }).length;
            if(categories < 2){
                return '密码必须包含至少两种字符类型';
            }
        }
    });
    form.render();
});
</script>
{% end %}
